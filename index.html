<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Firebase проект</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding: 50px;
            background-color: #f4f4f9;
        }
        .form-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 300px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background: #4f46e5;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            padding: 10px;
            width: 100%;
        }
        button:hover {
            background: #4338ca;
        }
    </style>
</head>
<div class="form-container">
    <h3>Отправить заявку</h3>
    <form id="feedbackForm">
        <input type="text" id="userName" placeholder="Ваше имя" required>
        <input type="email" id="userEmail" placeholder="Ваш Email" required>
        <button type="submit">Отправить в облако</button>
    </form>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAe3wXHHBp8IgWs2JOntVbpWGpMrgr8O14",
  authDomain: "nnnn-68466.firebaseapp.com",
  projectId: "nnnn-68466",
  storageBucket: "nnnn-68466.firebasestorage.app",
  messagingSenderId: "428383704835",
  appId: "1:428383704835:web:8150208bf3a676bc823b36"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 Правильная обработка формы
document.getElementById("feedbackForm").addEventListener("submit", async function(e) {
    e.preventDefault(); // отключаем перезагрузку страницы

    const name = document.getElementById("userName").value;
    const email = document.getElementById("userEmail").value;

    try {
        await addDoc(collection(db, "requests"), {
            name: name,
            email: email,
            created: new Date()
        });

        alert("Данные успешно отправлены!");
        document.getElementById("feedbackForm").reset();
    } catch (error) {
        alert("Ошибка: " + error);
    }
});

</script>
</body>
</html>
