<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>Firebase App</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
width:350px;
text-align:center;
}

h1{
margin-bottom:20px;
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
margin:5px;
font-size:14px;
}

.login{
background:#4285F4;
color:white;
}

.logout{
background:#e74c3c;
color:white;
}

.send{
background:#2ecc71;
color:white;
}

.upload{
background:#f39c12;
color:white;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

#form{
display:none;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Firebase Chat</h1>

<button id="login" class="login">Войти через Google</button>
<button id="logout" class="logout">Выйти</button>

<div id="form">

<input id="message" placeholder="Введите сообщение">

<button id="send" class="send">Отправить сообщение</button>

<hr>

<input type="file" id="image">

<button id="upload" class="upload">Загрузить картинку</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";

import { 
getAuth,
GoogleAuthProvider,
signInWithPopup,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-storage.js";


const firebaseConfig = {
  apiKey: "AIzaSyDeTACUBfB-XWhgtTtYqwavqHOkPcvLvTM",
  authDomain: "krillex-a57aa.firebaseapp.com",
  projectId: "krillex-a57aa",
  storageBucket: "krillex-a57aa.firebasestorage.app",
  messagingSenderId: "559983149303",
  appId: "1:559983149303:web:18d360a1775d3a81e4d3f2",
  measurementId: "G-HKR3DZYVD8"
};
const app = initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

const provider = new GoogleAuthProvider();


document.getElementById("login").onclick = () => {

signInWithPopup(auth,provider);

};

document.getElementById("logout").onclick = () => {

signOut(auth);

};


onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("form").style.display="block";

}else{

document.getElementById("form").style.display="none";

}

});


document.getElementById("send").onclick = async ()=>{

const text=document.getElementById("message").value;

try{

await addDoc(collection(db,"messages"),{

text:text,
date:Date.now()

});

alert("Сообщение отправлено");

}catch(e){

alert("Ошибка: "+e);

}

};


document.getElementById("upload").onclick = async ()=>{

const file=document.getElementById("image").files[0];

if(!file){

alert("Выберите файл");

return;

}

const storageRef = ref(storage,"images/"+file.name);

try{

await uploadBytes(storageRef,file);

alert("Картинка загружена");

}catch(e){

alert("Ошибка загрузки");

}

};

</script>

</body>

</html>
