<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Firebase Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#eceff1;
}

.app{
display:flex;
height:100vh;
}

.users{
width:280px;
background:white;
border-right:1px solid #ddd;
}

.users h3{
margin:0;
padding:15px;
background:#2c3e50;
color:white;
}

.user{
padding:12px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.user:hover{
background:#f5f5f5;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
overflow:auto;
padding:20px;
}

.bubble{
max-width:60%;
padding:10px 15px;
border-radius:15px;
margin:8px 0;
}

.me{
background:#2ecc71;
color:white;
margin-left:auto;
}

.other{
background:white;
border:1px solid #ddd;
}

.input{
display:flex;
padding:10px;
background:white;
border-top:1px solid #ddd;
}

.input input{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

.input button{
margin-left:10px;
padding:10px 20px;
border:none;
background:#3498db;
color:white;
border-radius:5px;
cursor:pointer;
}

.login{
position:absolute;
top:20px;
left:20px;
padding:10px 20px;
background:#e74c3c;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<button id="login" class="login">Войти через Google</button>

<div class="app">

<div class="users">
<h3>Пользователи</h3>
<div id="userList"></div>
</div>

<div class="chat">

<div id="messages" class="messages"></div>

<div class="input">
<input id="messageInput" placeholder="Сообщение">
<button id="send">Отправить</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
setDoc,
doc,
getDocs,
query,
onSnapshot,
orderBy
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyDeTACUBfB-XWhgtTtYqwavqHOkPcvLvTM",
authDomain:"krillex-a57aa.firebaseapp.com",
projectId:"krillex-a57aa",
storageBucket:"krillex-a57aa.appspot.com",
messagingSenderId:"559983149303",
appId:"1:559983149303:web:18d360a1775d3a81e4d3f2"
};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);
const db=getFirestore(app);

const provider=new GoogleAuthProvider();

let currentUser=null;
let selectedUser=null;
let unsubscribe=null;

const loginBtn=document.getElementById("login");
const userList=document.getElementById("userList");
const messages=document.getElementById("messages");
const sendBtn=document.getElementById("send");
const messageInput=document.getElementById("messageInput");

loginBtn.onclick=()=>{

signInWithPopup(auth,provider)
.catch(e=>alert(e.message));

};

onAuthStateChanged(auth,async(user)=>{

if(!user) return;

currentUser=user;

await setDoc(doc(db,"users",user.uid),{

email:user.email,
name:user.displayName

});

loadUsers();

});

async function loadUsers(){

const snap=await getDocs(collection(db,"users"));

userList.innerHTML="";

snap.forEach(d=>{

const data=d.data();

if(data.email!==currentUser.email){

const div=document.createElement("div");

div.className="user";
div.innerText=data.name;

div.onclick=()=>{

selectedUser=data.email;
loadMessages();

};

userList.appendChild(div);

}

});

}

function loadMessages(){

if(unsubscribe) unsubscribe();

const q=query(
collection(db,"messages"),
orderBy("date")
);

unsubscribe=onSnapshot(q,(snapshot)=>{

messages.innerHTML="";

snapshot.forEach(d=>{

const data=d.data();

if(
(data.from===currentUser.email && data.to===selectedUser)||
(data.from===selectedUser && data.to===currentUser.email)
){

const div=document.createElement("div");

div.className="bubble";

if(data.from===currentUser.email){

div.classList.add("me");

}else{

div.classList.add("other");

}

div.innerText=data.text;

messages.appendChild(div);

}

});

messages.scrollTop=messages.scrollHeight;

});

}

sendBtn.onclick=async()=>{

const text=messageInput.value.trim();

if(!text || !selectedUser) return;

await addDoc(collection(db,"messages"),{

from:currentUser.email,
to:selectedUser,
text:text,
date:Date.now()

});

messageInput.value="";

};

</script>

</body>
</html>
