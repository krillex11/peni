<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Firebase Realtime App</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f3f4f6;
    display: flex;
    justify-content: center;
    padding: 40px;
}

.container {
    width: 400px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.send-btn {
    width: 100%;
    background: #4f46e5;
    color: white;
}

.send-btn:hover {
    background: #4338ca;
}

.like-btn {
    background: #e5e7eb;
}

.like-btn:hover {
    background: #d1d5db;
}
</style>
</head>

<body>

<div class="container">

<h2>Реактивная лента</h2>

<div class="card">
    <input type="text" id="postText" placeholder="Введите сообщение">
    <button class="send-btn" id="sendBtn">Отправить</button>
</div>

<div id="posts"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
    getFirestore, 
    collection, 
    addDoc, 
    onSnapshot,
    query,
    orderBy,
    updateDoc,
    doc,
    increment,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAe3wXHHBp8IgWs2JOntVbpWGpMrgr8O14",
  authDomain: "nnnn-68466.firebaseapp.com",
  projectId: "nnnn-68466",
  storageBucket: "nnnn-68466.firebasestorage.app",
  messagingSenderId: "428383704835",
  appId: "1:428383704835:web:8150208bf3a676bc823b36"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 Функция 1 — добавление поста
async function addPost(text) {
    await addDoc(collection(db, "posts"), {
        text: text,
        likes: 0,
        timestamp: serverTimestamp()
    });
}

// 🔥 Функция 2 — атомарный лайк
async function likePost(postId) {
    const postRef = doc(db, "posts", postId);
    await updateDoc(postRef, {
        likes: increment(1)
    });
}

// Обработчик кнопки отправки
document.getElementById("sendBtn").addEventListener("click", async () => {
    const text = document.getElementById("postText").value.trim();
    if (text === "") return;

    await addPost(text);
    document.getElementById("postText").value = "";
});

// 📡 Реактивная синхронизация
const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));

onSnapshot(q, (snapshot) => {

    const container = document.getElementById("posts");
    container.innerHTML = "";

    snapshot.forEach((docSnap) => {
        const data = docSnap.data();

        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <p>${data.text}</p>
            <button class="like-btn" data-id="${docSnap.id}">
                👍 ${data.likes}
            </button>
        `;

        container.appendChild(div);
    });

    document.querySelectorAll(".like-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            likePost(btn.dataset.id);
        });
    });

});

</script>

</body>
</html>
