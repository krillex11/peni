<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Firebase Messenger</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.app{
display:flex;
height:100vh;
}

.users{
width:30%;
background:white;
border-right:1px solid #ddd;
overflow:auto;
}

.users h3{
padding:15px;
margin:0;
background:#3498db;
color:white;
}

.user{
padding:10px;
cursor:pointer;
border-bottom:1px solid #eee;
}

.user:hover{
background:#f5f5f5;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
padding:20px;
overflow:auto;
}

.msg{
margin:10px 0;
}

.me{
text-align:right;
color:#2c3e50;
font-weight:bold;
}

.input{
display:flex;
padding:10px;
background:white;
border-top:1px solid #ddd;
}

.input input{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

.input button{
margin-left:10px;
padding:10px 20px;
background:#2ecc71;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

.login{
position:absolute;
top:20px;
left:20px;
}

</style>

</head>

<body>

<button id="login" class="login">Войти через Google</button>

<div class="app">

<div class="users">
<h3>Пользователи</h3>
<div id="userList"></div>
</div>

<div class="chat">

<div id="messages" class="messages"></div>

<div class="input">
<input id="messageInput" placeholder="Сообщение">
<button id="send">Отправить</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
setDoc,
doc,
getDocs,
query,
onSnapshot,
orderBy
} from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyDeTACUBfB-XWhgtTtYqwavqHOkPcvLvTM",
authDomain:"krillex-a57aa.firebaseapp.com",
projectId:"krillex-a57aa",
storageBucket:"krillex-a57aa.firebasestorage.app",
messagingSenderId:"559983149303",
appId:"1:559983149303:web:18d360a1775d3a81e4d3f2"
};

const app=initializeApp(firebaseConfig);

const auth=getAuth(app);
const db=getFirestore(app);

const provider=new GoogleAuthProvider();

const loginBtn=document.getElementById("login");
const userList=document.getElementById("userList");
const messages=document.getElementById("messages");
const sendBtn=document.getElementById("send");
const messageInput=document.getElementById("messageInput");

let currentUser=null;
let selectedUser=null;
let unsubscribe=null;

loginBtn.onclick=()=>{
signInWithPopup(auth,provider);
};

onAuthStateChanged(auth,async(user)=>{

if(user){

currentUser=user;

await setDoc(doc(db,"users",user.uid),{
email:user.email,
name:user.displayName
});

loadUsers();

}

});

async function loadUsers(){

const snapshot=await getDocs(collection(db,"users"));

userList.innerHTML="";

snapshot.forEach((d)=>{

const data=d.data();

if(data.email!=currentUser.email){

const div=document.createElement("div");
div.className="user";
div.innerText=data.name;

div.onclick=()=>{

selectedUser=data.email;

loadMessages();

};

userList.appendChild(div);

}

});

}

function loadMessages(){

if(unsubscribe) unsubscribe();

const q=query(
collection(db,"messages"),
orderBy("date")
);

unsubscribe=onSnapshot(q,(snapshot)=>{

messages.innerHTML="";

snapshot.forEach((d)=>{

const data=d.data();

if(
(data.from==currentUser.email && data.to==selectedUser)||
(data.from==selectedUser && data.to==currentUser.email)
){

const div=document.createElement("div");

div.className="msg";

if(data.from==currentUser.email){
div.classList.add("me");
}

div.innerText=data.text;

messages.appendChild(div);

}

});

messages.scrollTop=messages.scrollHeight;

});

}

sendBtn.onclick=async()=>{

const text=messageInput.value.trim();

if(!text || !selectedUser) return;

await addDoc(collection(db,"messages"),{

from:currentUser.email,
to:selectedUser,
text:text,
date:Date.now()

});

messageInput.value="";

};

</script>

</body>
</html>
